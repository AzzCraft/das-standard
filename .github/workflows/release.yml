name: release-validation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          persist-credentials: false
      - uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: '3.11'
      - run: python3 -m pip install -r requirements-verify.txt pip-audit==2.10.1 bandit==1.9.4
      - run: ./scripts/verify
      - run: pip-audit --progress-spinner off -r requirements-verify.txt
      - run: bandit -q -lll -r tools
