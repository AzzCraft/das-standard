name: verify

on:
  push:
  pull_request:

jobs:
  release-bundle-self-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install jsonschema
      - run: ./scripts/verify
